# Ruff lint + format on commit. Activate once with:  uv run pre-commit install
# Hooks honor [tool.ruff] in pyproject.toml, including the force-excluded
# hear_pipeline/_vendor (Google's vendored audio_utils.py is never touched).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ty (type checker) runs via uv in the project venv so it can resolve the
  # model deps (torch/transformers) — an isolated hook env couldn't. The whole
  # project is checked at once (type checking needs the full module graph), so
  # changed filenames aren't passed.
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
