name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      # --no-group model skips torch+transformers (a multi-GB install) since
      # nothing CI runs needs them: ruff is standalone and the non-model tests
      # are numpy-only. --locked still asserts the committed lockfile is current.
      # Uses the Python pinned in .python-version.
      - name: Install dependencies
        run: uv sync --locked --no-group model

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      # The `model`-marked smoke test needs the gated HeAR model + an HF token,
      # which CI doesn't have, so it's excluded here.
      - name: Tests
        run: uv run pytest -m "not model"
