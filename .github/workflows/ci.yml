name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      # Installs the locked deps (incl. the project) into a fresh .venv.
      # Uses the Python pinned in .python-version. --locked fails if uv.lock
      # is stale, asserting the committed lockfile is reproducible.
      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      # The `model`-marked smoke test needs the gated HeAR model + an HF token,
      # which CI doesn't have, so it's excluded here.
      - name: Tests
        run: uv run pytest -m "not model"
