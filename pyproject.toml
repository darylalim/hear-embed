[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hear-pipeline"
version = "0.1.0"
description = "Embed health-acoustic recordings with the Google HeAR model."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.11",
    "soundfile>=0.12",
    "torch>=2.1",
    # Pinned: google/hear-pytorch is exported against this transformers release.
    "transformers==4.50.3",
    "pyarrow>=14",
    "huggingface-hub>=0.23",
    "tqdm>=4.66",
]

[project.scripts]
hear-embed = "hear_pipeline.cli:main"

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=8",
    "ruff>=0.15.17",
]

[tool.hatch.build.targets.wheel]
packages = ["hear_pipeline"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "model: requires the gated HeAR model + torch/transformers (deselect with -m 'not model')",
]

[tool.ruff]
target-version = "py310"
# Google's audio_utils.py is vendored unmodified — never lint/reformat it.
# force-exclude keeps it excluded even when paths are passed explicitly (pre-commit/CI).
extend-exclude = ["hear_pipeline/_vendor"]
force-exclude = true

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.format]
docstring-code-format = true
